services:
  - type: web
    name: yt-video-guides-backend
    runtime: python
    plan: free
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt && python -m pip install -U opentube
    startCommand: python -m uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: RENDER
        value: "true"
      - key: BACKEND_HOST
        value: 0.0.0.0
      - key: LLM_PROVIDER
        value: openrouter
      - key: OPENROUTER_MODEL
        value: openai/gpt-4o-mini
      - key: OPENROUTER_BASE_URL
        value: https://openrouter.ai/api/v1
      - key: OPENROUTER_SITE_URL
        value: https://yt-video-guides-frontend.onrender.com
      - key: OPENROUTER_APP_NAME
        value: YouTube-to-Notion Guide Generator
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
      - key: GEMINI_BASE_URL
        value: https://generativelanguage.googleapis.com/v1beta
      - key: MAX_VIDEOS_PER_CHANNEL
        value: 5
      - key: MAX_CONCURRENT_VIDEOS
        value: 3
      - key: MAX_TOKENS_PER_CHUNK
        value: 30000
      - key: RESPONSE_MAX_TOKENS
        value: 4096
      - key: REQUEST_TIMEOUT
        value: 60
      - key: TRANSCRIPT_LANGUAGES
        value: en,en-US,en-GB
      - key: LOG_LEVEL
        value: INFO
      - key: NOTION_API_KEY
        sync: false
      - key: NOTION_DATABASE_ID
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false

  - type: web
    name: yt-video-guides-frontend
    runtime: python
    plan: free
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt && python -m pip install -U opentube
    startCommand: streamlit run frontend/app.py --server.address 0.0.0.0 --server.port $PORT --server.headless true --browser.gatherUsageStats false
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: BACKEND_URL
        fromService:
          type: web
          name: yt-video-guides-backend
          property: hostport
